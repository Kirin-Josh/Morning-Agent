<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Set!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 3rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.75rem;
    }

    p {
      color: #555;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a.btn {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background: #f0f0f0;
      color: #333;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s;
    }

    a.btn:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>You're all set!</h1>
    <p>Your account has been connected. You'll start receiving your morning briefing the next time it runs.</p>
    <a href="/" class="btn">Add another team member</a>
  </div>
</body>
</html>
